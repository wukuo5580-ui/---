{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Blog{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a class="logo" href="{% url 'home' %}">Post Directory</a>

            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'post_list' %}">All Posts</a>

                {% if user.is_authenticated %}
                    <a href="{% url 'add_post' %}">Add Post</a>
                    <span class="user-label">User：{{ user.username }}</span>

                    <form class="logout-form" method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        <button type="submit">Log Out</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Log In</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <p>MOS BLOG</p>
    </footer>
</body>
</html>
